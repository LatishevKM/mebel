    AGENTS.md: ''
    initial.md: >
      # Requirements

      ## Summary

      Приложение для расчёта стоимости мебели позволяет пользователям
      формировать список мебельных позиций, указывать материалы, размеры,
      количество и цены, а также получать итоговую стоимость заказа. Приложение
      ориентировано на менеджеров мебельных компаний и частных клиентов, которым
      нужно быстро оценить стоимость изделий. Основная ценность — удобный
      калькулятор с возможностью управления позициями и просмотра итоговой
      суммы.


      ## Use cases

      - Расчёт стоимости заказа
        1) Пользователь открывает приложение и видит форму для добавления позиций мебели.
        2) Пользователь заполняет название, категорию, материал, размеры (ширина, высота, глубина), количество и цену за единицу.
        3) Пользователь нажимает «Добавить позицию» — она появляется в таблице заказа.
        4) Пользователь может редактировать или удалять позиции из таблицы.
        5) При������ожение автоматически отображает промежуточные суммы по каждой позиции и итоговую сумму заказа.

      - Управление позициями и итогами
        1) Пользователь видит таблицу со всеми добавленными позициями.
        2) Пользователь может изменить количество или цену любой позиции — итог пересчитывается мгновенно.
        3) Пользователь может удалить одну или все позиции.
        4) Пользователь видит блок с итоговой суммой, скидкой и финальной ценой.
        5) Пользователь может задать скидку в процентах для всего заказа.

      - Сохранение и печать расчёта
        1) Пользователь вводит название заказа и имя клиента.
        2) Пользователь нажимает «Сохранить расчёт» — данные сохраняются в список сохранённых расчётов.
        3) Пользователь может открыть любой сохранённый расчёт и продолжить его редактирование.
        4) Пользователь может нажать «Распечатать» для вывода расчёта на печать.

      ## Plan

      ### Расчёт стоимости заказа

      1. [x] Создать главную страницу приложения с разделением на форму
      добавления позиции (левая/верхняя панель) и таблицу позиций (правая/нижняя
      панель).

      2. [x] Реализовать форму добавления позиции с полями: название, категория
      (выпадающий список: диван, кресло, стол, стул, шкаф, кровать, прочее),
      материал (дерево, МДФ, ДСП, металл, ткань, кожа, прочее), ширина (мм),
      высота (мм), глубина (мм), количество, цена за единицу (руб.).

      3. [x] Реализовать кнопку «Добавить позицию» с валидацией обязательных
      полей (название, количество, цена).

      4. [x] Реализовать таблицу позиций с колонками: №, Название, Категория,
      Материал, Размеры, Кол-во, Цена за ед., Сумма, Действия
      (редактировать/удалить).

      5. [x] Реализовать автоматический подсчёт суммы по каждой позиции (кол-во
      × цена) и итоговой суммы внизу таблицы.

      6. [x] Добавить возможность редактирования позиции (открытие формы с
      предзаполненными данными) и удаления позиции.

      7. [x] Добавить mock-данные с 3–4 примерами позиций для демонстрации
      работы.


      ### Управление позициями и итогами

      1. [x] Добавить inline-редактирование количества и цены прямо в таблице с
      мгновенным пересчётом итогов.

      2. [x] Добавить кнопку «Очистить всё» для удаления всех позиций с
      подтверждением.

      3. [x] Реализовать блок итогов: подытог, поле для ввода скидки (%), сумма
      скидки, итого к оплате.

      4. [x] Обеспечить автоматический пересчёт всех итогов при любом изменении
      данных.


      ### Сохранение и печать расчёта

      1. [] Добавить панель с полями «Название заказа» и «Имя клиента» в верхней
      части страницы.

      2. [] Реализовать кнопку «Сохранить расчёт», сохраняющую текущий заказ (с
      позициями и итогами) в список сохранённых расчётов (localStorage /
      состояние).

      3. [] Добавить боковую панель или секцию «Сохранённые расчёты» со списком
      сохранённых заказов (название, клиент, дата, итоговая сумма).

      4. [] Реализовать загрузку сохранённого расчёта по клику для его
      просмотра/редактирования.

      5. [] Реализовать кнопку «Распечатать», вызывающую window.print() с
      корректным print-стилем страницы.
