    app/app.tsx: >
      import { useState } from 'react';

      import { Card, CardContent, CardHeader, CardTitle } from
      '@/components/ui/card';

      import { Button } from '@/components/ui/button';

      import { Separator } from '@/components/ui/separator';

      import { PlusCircle } from 'lucide-react';

      import { ConfigForm } from './config-form';

      import { FurniturePreview } from './furniture-preview';

      import { DetailsTable } from './details-table';

      import { OrderSummary } from './order-summary';

      import { calculate } from './calculator';

      import { DEFAULT_CONFIG, type FurnitureConfig, type OrderItem } from
      './types';


      let nextId = 1;

      function genId() { return String(nextId++); }


      function fmtMoney(n: number) {
        return n.toLocaleString('ru-RU', { style: 'currency', currency: 'RUB', maximumFractionDigits: 0 });
      }

      function fmtArea(n: number) {
        return n.toLocaleString('ru-RU', { maximumFractionDigits: 3 });
      }


      function App() {
        const [config, setConfig] = useState<FurnitureConfig>(DEFAULT_CONFIG);
        const [orderItems, setOrderItems] = useState<OrderItem[]>([]);
        const [editingId, setEditingId] = useState<string | null>(null);
        const [discount, setDiscount] = useState(0);

        const result = calculate(config);

        const handleAddToOrder = () => {
          if (editingId) {
            setOrderItems((prev) => prev.map((i) => i.id === editingId ? { id: editingId, config: { ...config } } : i));
            setEditingId(null);
          } else {
            setOrderItems((prev) => [...prev, { id: genId(), config: { ...config } }]);
          }
          setConfig({ ...DEFAULT_CONFIG, name: 'Новое изделие' });
        };

        const handleEditItem = (item: OrderItem) => {
          setConfig({ ...item.config });
          setEditingId(item.id);
          window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        const handleCancelEdit = () => {
          setEditingId(null);
          setConfig({ ...DEFAULT_CONFIG, name: 'Новое изделие' });
        };

        const handleRemoveItem = (id: string) => {
          setOrderItems((prev) => prev.filter((i) => i.id !== id));
          if (editingId === id) { setEditingId(null); }
        };

        const handleClearAll = () => {
          setOrderItems([]);
          setEditingId(null);
          setDiscount(0);
        };

        return (
          <div className="min-h-screen bg-muted/30 p-4 md:p-6">
            <div className="max-w-7xl mx-auto space-y-5">
              {/* Header */}
              <div className="flex items-baseline gap-3">
                <h1 className="text-2xl font-bold tracking-tight">Калькулятор корпусной мебели</h1>
                <span className="text-sm text-muted-foreground">Расчёт площади и стоимости по деталям</span>
              </div>

              <div className="grid grid-cols-1 xl:grid-cols-[320px_1fr_260px] gap-5 items-start">
                {/* Left: config form */}
                <Card>
                  <CardHeader className="flex-row items-center justify-between pb-3">
                    <CardTitle className="text-base">
                      {editingId ? 'Редактирование изделия' : 'Параметры изделия'}
                    </CardTitle>
                  </CardHeader>
                  <CardContent className="p-6 pt-0 space-y-4">
                    <ConfigForm config={config} onChange={setConfig} />
                    <Separator />
                    <div className="flex gap-2">
                      <Button type="button" className="flex-1 gap-2" onClick={handleAddToOrder}>
                        <PlusCircle className="h-4 w-4" />
                        {editingId ? 'Сохранить' : 'Добавить в заказ'}
                      </Button>
                      {editingId && (
                        <Button type="button" variant="outline" onClick={handleCancelEdit}>
                          Отмена
                        </Button>
                      )}
                    </div>
                  </CardContent>
                </Card>

                {/* Centre: preview + spec */}
                <div className="space-y-5">
                  <div className="grid grid-cols-1 sm:grid-cols-[1fr_auto] gap-5">
                    {/* SVG Preview */}
                    <Card>
                      <CardHeader>
                        <CardTitle className="text-base">Визуализация</CardTitle>
                      </CardHeader>
                      <CardContent className="p-6 pt-0 flex items-center justify-center">
                        <FurniturePreview config={config} />
                      </CardContent>
                    </Card>

                    {/* Current item totals */}
                    <Card className="sm:w-52">
                      <CardHeader>
                        <CardTitle className="text-base">Текущее изделие</CardTitle>
                      </CardHeader>
                      <CardContent className="p-6 pt-0 space-y-4">
                        <div>
                          <p className="text-xs text-muted-foreground">Деталей</p>
                          <p className="text-2xl font-bold">{result.details.reduce((s, d) => s + d.count, 0)}</p>
                        </div>
                        <Separator />
                        <div>
                          <p className="text-xs text-muted-foreground">Площадь</p>
                          <p className="text-2xl font-bold">{fmtArea(result.totalAreaSqM)}<span className="text-sm font-normal ml-1">м²</span></p>
                        </div>
                        <Separator />
                        <div>
                          <p className="text-xs text-muted-foreground">Цена за м²</p>
                          <p className="text-lg font-semibold">{fmtMoney(config.pricePerSqM)}</p>
                        </div>
                        <Separator />
                        <div>
                          <p className="text-xs text-muted-foreground">Стоимость</p>
                          <p className="text-2xl font-bold text-primary">{fmtMoney(result.totalPrice)}</p>
                        </div>
                      </CardContent>
                    </Card>
                  </div>

                  {/* Details table */}
                  <Card>
                    <CardHeader>
                      <CardTitle className="text-base">Спецификация деталей</CardTitle>
                    </CardHeader>
                    <CardContent className="p-6 pt-0">
                      <DetailsTable result={result} pricePerSqM={config.pricePerSqM} />
                    </CardContent>
                  </Card>
                </div>

                {/* Right: order summary */}
                <div className="space-y-5">
                  <OrderSummary
                    items={orderItems}
                    discount={discount}
                    onDiscountChange={setDiscount}
                    onRemoveItem={handleRemoveItem}
                    onClearAll={handleClearAll}
                    onEditItem={handleEditItem}
                  />
                </div>
              </div>
            </div>
          </div>
        );
      }


      export default App;
    components/ui/button.tsx: |+
      import * as React from "react"
      import { Slot } from "@radix-ui/react-slot"
      import { cva, type VariantProps } from "class-variance-authority"

      import { cn } from "@/lib/utils"

      const buttonVariants = cva(
        "inline-flex items-center justify-center gap-2 whitespace-nowrap rounded-md text-sm font-medium transition-colors focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-ring disabled:pointer-events-none disabled:opacity-50 [&_svg]:pointer-events-none [&_svg]:size-4 [&_svg]:shrink-0",
        {
          variants: {
            variant: {
              default:
                "bg-primary text-primary-foreground shadow hover:bg-primary/90",
              destructive:
                "bg-destructive text-destructive-foreground shadow-sm hover:bg-destructive/90",
              outline:
                "border border-input bg-background shadow-sm hover:bg-accent hover:text-accent-foreground",
              secondary:
                "bg-secondary text-secondary-foreground shadow-sm hover:bg-secondary/80",
              ghost: "hover:bg-accent hover:text-accent-foreground",
              link: "text-primary underline-offset-4 hover:underline",
            },
            size: {
              default: "h-9 px-4 py-2",
              sm: "h-8 rounded-md px-3 text-xs",
              lg: "h-10 rounded-md px-8",
              icon: "h-9 w-9",
            },
          },
          defaultVariants: {
            variant: "default",
            size: "default",
          },
        }
      )

      export interface ButtonProps
        extends React.ButtonHTMLAttributes<HTMLButtonElement>,
          VariantProps<typeof buttonVariants> {
        asChild?: boolean
      }

      const Button = React.forwardRef<HTMLButtonElement, ButtonProps>(
        ({ className, variant, size, asChild = false, ...props }, ref) => {
          const Comp = asChild ? Slot : "button"
          return (
            <Comp
              className={cn(buttonVariants({ variant, size, className }))}
              ref={ref}
              {...props}
            />
          )
        }
      )
      Button.displayName = "Button"

      export { Button, buttonVariants }

    components/ui/card.tsx: >+
      import * as React from "react"


      import { cn } from "@/lib/utils"


      const Card = React.forwardRef<
