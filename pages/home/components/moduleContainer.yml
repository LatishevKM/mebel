    app/calculator.ts: >
      import type { FurnitureConfig, DetailItem, CalculationResult } from
      './types';


      export function calculate(cfg: FurnitureConfig): CalculationResult {
        const { width: W, height: H, depth: D, thickness: T } = cfg;
        const sections = Math.max(1, cfg.sections);

        const innerW = W - 2 * T;
        const innerH = H - 2 * T;

        const details: DetailItem[] = [];

        function add(name: string, w: number, h: number, count: number) {
          if (w <= 0 || h <= 0 || count <= 0) return;
          const areaSqM = (w / 1000) * (h / 1000) * count;
          details.push({ name, width: Math.round(w), height: Math.round(h), count, areaSqM });
        }

        // --- Корпус ---
        add('Боковая стенка', D, H, 2);
        if (cfg.topPanel) add('Крышка', innerW, D, 1);
        add('Дно', innerW, D, 1);

        // Вертикальные перегородки (sections - 1)
        const partCount = sections - 1;
        if (partCount > 0) {
          add('Вертикальная перегородка', D, innerH, partCount);
        }

        // Задняя стенка
        if (cfg.backPanel) {
          add('Задняя стенка (ХДФ)', innerW, innerH, 1);
        }

        // Антресоль
        const mezzH = cfg.mezzanine ? cfg.mezzanineHeight : 0;
        if (cfg.mezzanine && mezzH > 0) {
          add('Дно антресоли', innerW, D, 1);
          if (cfg.backPanel) add('Задняя стенка антресоли (ХДФ)', innerW, mezzH - T, 1);
          // Двери антресоли (распашные)
          add('Дверь антресоли', innerW / sections, mezzH - T, sections);
        }

        // --- Наполнение ---
        const bodyH = innerH - mezzH; // рабочая высота корпуса
        const sectionW = innerW / sections; // ширина одной секции

        // Полки (равномерно по высоте в каждой секции)
        if (cfg.shelves.count > 0) {
          const shelfW = cfg.shelves.fullWidth ? sectionW : sectionW / 2;
          const shelfCount = cfg.shelves.fullWidth
            ? cfg.shelves.count * sections
            : cfg.shelves.count * sections * 2;
          add('Полка', shelfW, D - 50, shelfCount);
        }

        // Ящики
        if (cfg.drawers.count > 0) {
          const dH = cfg.drawers.height;
          const drawerInnerW = sectionW - 2 * T;
          const drawerInnerD = D - T - 50;
          add('Фасад ящика', sectionW, dH - T, cfg.drawers.count * sections);
          add('Стенка ящика (пер./зад.)', drawerInnerW, dH - 2 * T, cfg.drawers.count * sections * 2);
          add('Стенка ящика (бок.)', drawerInnerD, dH - 2 * T, cfg.drawers.count * sections * 2);
          add('Дно ящика', drawerInnerW, drawerInnerD, cfg.drawers.count * sections);
        }

        // Штанга (учитываем 2 кронштейна на секцию — не деталь ЛДСП, просто фурнитура, но упоминаем)
        // Не добавляем в площадь — штанга металлическая

        // Двери
        if (cfg.doors.type === 'swing' && cfg.doors.count > 0) {
          const doorW = innerW / cfg.doors.count;
          const doorH = bodyH - 4;
          add('Дверь распашная', doorW - 2, doorH, cfg.doors.count);
        }

        if (cfg.doors.type === 'sliding' && cfg.doors.count > 0) {
          const doorW = (innerW + 60) / (cfg.doors.count - 0.5);
          add('Дверь-купе', Math.round(doorW), bodyH - 10, cfg.doors.count);
        }

        // Ножки не считаем как ЛДСП

        const totalAreaSqM = details.reduce((s, d) => s + d.areaSqM, 0);
        const totalPrice = totalAreaSqM * cfg.pricePerSqM;

        return { details, totalAreaSqM, totalPrice };
      }
    app/furniture-preview.tsx: |
      import type { FurnitureConfig } from './types';

      const WOOD_COLOR = '#D4A96A';
      const WOOD_DARK = '#B8864E';
      const SHELF_COLOR = '#C49A5A';
      const DRAWER_COLOR = '#E8C99A';
      const DRAWER_HANDLE = '#777';
      const DOOR_COLOR = 'rgba(180,160,120,0.30)';
      const DOOR_STROKE = '#8B6914';
      const ROD_COLOR = '#aaa';
      const MEZZ_COLOR = 'rgba(200,170,100,0.18)';

      interface Props { config: FurnitureConfig; }

      export function FurniturePreview({ config }: Props) {
        const { width: W, height: H, depth: D, thickness: T, shelves, drawers, doors } = config;
        const sections = Math.max(1, config.sections);

        const SVG_W = 360;
        const SVG_H = 400;
        const PAD_LEFT = 28;
        const PAD_RIGHT = 90; // space for side view
        const PAD_TOP = 22;
        const PAD_BOT = 30;

        const scaleX = (SVG_W - PAD_LEFT - PAD_RIGHT) / W;
        const scaleY = (SVG_H - PAD_TOP - PAD_BOT) / H;
        const scale = Math.min(scaleX, scaleY);

        const sw = W * scale;
        const sh = H * scale;
        const st = T * scale;
        const ox = PAD_LEFT + ((SVG_W - PAD_LEFT - PAD_RIGHT) - sw) / 2;
        const oy = PAD_TOP + ((SVG_H - PAD_TOP - PAD_BOT) - sh) / 2;

        const innerW = sw - 2 * st;
        const innerH = sh - 2 * st;
        const innerX = ox + st;
        const innerY = oy + st;

        const mezzH = config.mezzanine ? config.mezzanineHeight * scale : 0;
        const bodyH = innerH - mezzH;
        const sectionW = innerW / sections;

        // Drawer zone height (per section, from bottom)
        const drawerZoneH = drawers.count > 0 ? drawers.count * drawers.height * scale : 0;
        const availableH = bodyH - drawerZoneH;

        // Shelf positions per section
        const shelfPositions: number[] = [];
        if (shelves.count > 0 && availableH > 0) {
          for (let i = 1; i <= shelves.count; i++) {
            shelfPositions.push(innerY + mezzH + (availableH / (shelves.count + 1)) * i);
          }
        }

        // Drawer rects (from bottom, inside each section)
        const drawerRects: { y: number; h: number }[] = [];
        if (drawers.count > 0) {
          const dsh = drawers.height * scale;
          for (let i = 0; i < drawers.count; i++) {
            drawerRects.push({ y: innerY + innerH - (i + 1) * dsh, h: dsh });
          }
        }

        // Door rects (full front view)
        const doorRects: { x: number; w: number }[] = [];
        if (doors.type !== 'none' && doors.count > 0) {
          const dw = innerW / doors.count;
          for (let i = 0; i < doors.count; i++) {
            doorRects.push({ x: innerX + i * dw, w: dw });
          }
        }

        // Legs height
        const legH = config.bottomLegs ? 6 : 0;

        // Side view
        const sideX = ox + sw + 12;
        const sideMaxW = SVG_W - sideX - 4;
        const sideScale = Math.min(sideMaxW / D, sh / H);
        const sideW = D * sideScale;
        const sideH = H * sideScale;

        return (
          <svg width={SVG_W} height={SVG_H} viewBox={`0 0 ${SVG_W} ${SVG_H}`} className="w-full h-auto">
            <defs>
              <pattern id="wood2" patternUnits="userSpaceOnUse" width="8" height="8">
                <rect width="8" height="8" fill={WOOD_COLOR} />
                <line x1="0" y1="4" x2="8" y2="4" stroke={WOOD_DARK} strokeWidth="0.5" opacity="0.4" />
              </pattern>
              <marker id="arr2" markerWidth="5" markerHeight="5" refX="2.5" refY="2.5" orient="auto">
                <path d="M0,0 L5,2.5 L0,5 Z" fill="#666" />
              </marker>
              <marker id="arr2r" markerWidth="5" markerHeight="5" refX="2.5" refY="2.5" orient="auto-start-reverse">
                <path d="M0,0 L5,2.5 L0,5 Z" fill="#666" />
              </marker>
            </defs>

            {/* === TITLE === */}
            <text x={ox + sw / 2} y={14} textAnchor="middle" fontSize="11" fontWeight="600" fill="#333">{config.name}</text>

            {/* === LEGS === */}
            {config.bottomLegs && (
              <>
                <rect x={ox + st + 6} y={oy + sh} width={8} height={legH} fill="#999" rx="1" />
                <rect x={ox + sw - st - 14} y={oy + sh} width={8} height={legH} fill="#999" rx="1" />
                {sections > 1 && Array.from({ length: sections - 1 }, (_, i) => (
                  <rect key={i} x={ox + st + sectionW * (i + 1) - 4} y={oy + sh} width={8} height={legH} fill="#999" rx="1" />
                ))}
              </>
            )}

            {/* === OUTER CORPUS === */}
            <rect x={ox} y={oy} width={sw} height={sh} fill="url(#wood2)" stroke={WOOD_DARK} strokeWidth="1.5" rx="2" />

            {/* === INNER CAVITY === */}
            <rect x={innerX} y={innerY} width={innerW} height={innerH} fill="#F5ECD7" />

            {/* === MEZZANINE ZONE === */}
            {config.mezzanine && mezzH > 0 && (
              <>
                <rect x={innerX} y={innerY} width={innerW} height={mezzH} fill={MEZZ_COLOR} stroke={WOOD_DARK} strokeWidth="0.5" strokeDasharray="3 2" />
                {/* Mezzanine bottom panel */}
                <rect x={innerX} y={innerY + mezzH - st / 2} width={innerW} height={st} fill={SHELF_COLOR} stroke={WOOD_DARK} strokeWidth="0.5" />
                <text x={innerX + innerW / 2} y={innerY + mezzH / 2 + 4} textAnchor="middle" fontSize="8" fill="#8B6914">антресоль</text>
              </>
            )}

            {/* === VERTICAL SECTION DIVIDERS === */}
            {sections > 1 && Array.from({ length: sections - 1 }, (_, i) => {
              const px = innerX + sectionW * (i + 1) - st / 2;
              return (
                <rect key={i} x={px} y={innerY + mezzH} width={st} height={bodyH} fill={SHELF_COLOR} stroke={WOOD_DARK} strokeWidth="0.5" />
              );
            })}

            {/* === SHELVES === */}
            {shelfPositions.map((sy, si) =>
              Array.from({ length: sections }, (_, sec) => {
                const sx = innerX + sectionW * sec;
                const sw2 = shelves.fullWidth ? sectionW : sectionW / 2;
                const count = shelves.fullWidth ? 1 : 2;
                return Array.from({ length: count }, (__, half) => (
                  <rect
                    key={`shelf-${si}-${sec}-${half}`}
                    x={sx + half * sw2}
                    y={sy - st / 2}
                    width={sw2}
                    height={st}
                    fill={SHELF_COLOR}
                    stroke={WOOD_DARK}
                    strokeWidth="0.5"
                  />
                ));
              })
            )}

            {/* === HANGING ROD === */}
            {config.hangingRod && (
              Array.from({ length: sections }, (_, sec) => {
                const rodX = innerX + sectionW * sec + 6;
                const rodY = innerY + mezzH + (bodyH - drawerZoneH) * 0.25;
                return (
                  <g key={sec}>
                    <line
                      x1={rodX} y1={rodY}
                      x2={rodX + sectionW - 12} y2={rodY}
                      stroke={ROD_COLOR} strokeWidth="3" strokeLinecap="round"
                    />
                    {/* Rod brackets */}
                    <circle cx={rodX + 4} cy={rodY} r={3} fill={ROD_COLOR} />
                    <circle cx={rodX + sectionW - 16} cy={rodY} r={3} fill={ROD_COLOR} />
                  </g>
                );
              })
            )}

            {/* === DRAWERS === */}
            {drawerRects.map((dr, di) =>
              Array.from({ length: sections }, (_, sec) => {
                const dx = innerX + sectionW * sec + 2;
                return (
                  <g key={`d-${di}-${sec}`}>
                    <rect x={dx} y={dr.y + 2} width={sectionW - 4} height={dr.h - 4} fill={DRAWER_COLOR} stroke={WOOD_DARK} strokeWidth="0.8" rx="1" />
                    <rect x={dx + sectionW / 2 - 14} y={dr.y + dr.h / 2 - 3} width={28} height={5} fill={DRAWER_HANDLE} rx="2.5" />
                  </g>
                );
              })
            )}

            {/* === DOORS === */}
            {doors.type === 'swing' && doorRects.map((dr, i) => (
              <g key={i}>
                <rect x={dr.x + 1} y={innerY + mezzH + 1} width={dr.w - 2} height={bodyH - 2} fill={DOOR_COLOR} stroke={DOOR_STROKE} strokeWidth="1" rx="1" />
                <rect
                  x={i % 2 === 0 ? dr.x + dr.w - 8 : dr.x + 4}
                  y={innerY + mezzH + bodyH / 2 - 14}
                  width={4} height={28} fill={DRAWER_HANDLE} rx="2"
                />
                {[0.2, 0.8].map((f) => (
                  <circle key={f}
                    cx={i % 2 === 0 ? dr.x + 6 : dr.x + dr.w - 6}
                    cy={innerY + mezzH + bodyH * f}
                    r={2.5} fill="#bbb" stroke="#888" strokeWidth="0.5"
                  />
                ))}
              </g>
            ))}

            {doors.type === 'sliding' && doorRects.map((dr, i) => (
              <g key={i}>
                <rect
                  x={dr.x + (i % 2 === 0 ? 1 : -6)}
                  y={innerY + mezzH}
                  width={dr.w} height={bodyH}
                  fill={DOOR_COLOR} stroke={DOOR_STROKE} strokeWidth="1" rx="1"
                />
                <rect
                  x={dr.x + dr.w / 2 - 3 + (i % 2 === 0 ? 1 : -6)}
                  y={innerY + mezzH + bodyH / 2 - 16}
                  width={5} height={32} fill={DRAWER_HANDLE} rx="2.5"
                />
              </g>
            ))}

            {/* Corpus outline over everything */}
            <rect x={ox} y={oy} width={sw} height={sh} fill="none" stroke={WOOD_DARK} strokeWidth="1.5" rx="2" />

            {/* === DIMENSIONS === */}
            {/* Width */}
            <line x1={ox} y1={oy + sh + legH + 8} x2={ox + sw} y2={oy + sh + legH + 8} stroke="#666" strokeWidth="0.8" markerEnd="url(#arr2)" markerStart="url(#arr2r)" />
            <text x={ox + sw / 2} y={oy + sh + legH + 20} textAnchor="middle" fontSize="10" fill="#555">{W} мм</text>
            {/* Height */}
            <line x1={ox - 8} y1={oy} x2={ox - 8} y2={oy + sh} stroke="#666" strokeWidth="0.8" markerEnd="url(#arr2)" markerStart="url(#arr2r)" />
            <text x={ox - 12} y={oy + sh / 2} textAnchor="middle" fontSize="10" fill="#555" transform={`rotate(-90,${ox - 12},${oy + sh / 2})`}>{H} мм</text>

            {/* === SIDE VIEW === */}
            <rect x={sideX} y={oy} width={sideW} height={sideH} fill={WOOD_COLOR} stroke={WOOD_DARK} strokeWidth="1" opacity="0.85" rx="1" />
            {/* inner depth indicator */}
            <rect x={sideX + st * sideScale / st} y={oy + st * sideScale / st} width={sideW - 2 * st * sideScale / st} height={sideH - 2 * st * sideScale / st} fill="#F5ECD7" opacity="0.5" />
            <text x={sideX + sideW / 2} y={oy + sideH + 13} textAnchor="middle" fontSize="9" fill="#666">{D} мм</text>
            <text x={sideX + sideW / 2} y={oy - 4} textAnchor="middle" fontSize="8" fill="#999">сбоку</text>
          </svg>
        );
      }
    app/details-table.tsx: >
      import { Table, TableBody, TableCell, TableHead, TableHeader, TableRow,
      TableFooter } from '@/components/ui/table';

      import type { CalculationResult } from './types';


      interface Props {
        result: CalculationResult;
        pricePerSqM: number;
      }


      function fmt(n: number) {
        return n.toLocaleString('ru-RU', { maximumFractionDigits: 4 });
      }

      function fmtMoney(n: number) {
        return n.toLocaleString('ru-RU', { style: 'currency', currency: 'RUB', maximumFractionDigits: 0 });
      }


      export function DetailsTable({ result, pricePerSqM }: Props) {
        return (
          <div className="overflow-auto">
            <Table>
              <TableHeader>
                <TableRow>
                  <TableHead>Деталь</TableHead>
                  <TableHead className="text-right">Ш × В (мм)</TableHead>
                  <TableHead className="text-right">Кол-во</TableHead>
                  <TableHead className="text-right">Площадь (м²)</TableHead>
                  <TableHead className="text-right">Стоимость</TableHead>
                </TableRow>
              </TableHeader>
              <TableBody>
                {result.details.map((d, i) => (
                  <TableRow key={i}>
                    <TableCell className="font-medium">{d.name}</TableCell>
                    <TableCell className="text-right text-muted-foreground">{d.width} × {d.height}</TableCell>
                    <TableCell className="text-right">{d.count}</TableCell>
                    <TableCell className="text-right">{fmt(d.areaSqM)}</TableCell>
                    <TableCell className="text-right">{fmtMoney(d.areaSqM * pricePerSqM)}</TableCell>
                  </TableRow>
                ))}
              </TableBody>
              <TableFooter>
                <TableRow>
                  <TableCell colSpan={3} className="text-right font-semibold">Итого площадь:</TableCell>
                  <TableCell className="text-right font-bold">{fmt(result.totalAreaSqM)} м²</TableCell>
                  <TableCell className="text-right font-bold text-lg">{fmtMoney(result.totalPrice)}</TableCell>
                </TableRow>
              </TableFooter>
            </Table>
          </div>
        );
      }
    app/config-form.tsx: >
      import { Input } from '@/components/ui/input';

      import { Label } from '@/components/ui/label';

      import { Select, SelectContent, SelectItem, SelectTrigger, SelectValue }
      from '@/components/ui/select';

      import { Separator } from '@/components/ui/separator';

      import { Button } from '@/components/ui/button';

      import { FURNITURE_TYPES, PRESETS, type FurnitureConfig, type
      FurnitureType } from './types';


      interface Props {
        config: FurnitureConfig;
        onChange: (cfg: FurnitureConfig) => void;
      }


      function Field({ label, children }: { label: string; children:
      React.ReactNode }) {
        return (
          <div className="grid gap-1.5">
            <Label className="text-xs text-muted-foreground">{label}</Label>
            {children}
          </div>
        );
      }


      function NumInput({ value, onChange, min = 0, max, step = 1 }: {
        value: number; onChange: (v: number) => void; min?: number; max?: number; step?: number;
      }) {
        return (
          <Input
            type="number"
            value={value}
            min={min}
            max={max}
            step={step}
            onChange={(e) => { const v = parseFloat(e.target.value); if (!isNaN(v)) onChange(v); }}
            className="h-8 text-sm"
          />
        );
      }


      function CheckRow({ id, checked, onChange, label }: { id: string; checked:
      boolean; onChange: (v: boolean) => void; label: string }) {
        return (
          <div className="flex items-center gap-2">
            <input type="checkbox" id={id} checked={checked} onChange={(e) => onChange(e.target.checked)} className="h-4 w-4 accent-primary" />
            <Label htmlFor={id} className="text-sm cursor-pointer">{label}</Label>
          </div>
        );
      }


      export function ConfigForm({ config, onChange }: Props) {
        function set<K extends keyof FurnitureConfig>(key: K, value: FurnitureConfig[K]) {
          onChange({ ...config, [key]: value });
        }

        const applyPreset = (idx: number) => {
          const preset = PRESETS[idx];
          onChange({ ...config, ...preset.config });
        };

        return (
          <div className="space-y-4">
            {/* Presets */}
            <div>
              <p className="text-xs font-semibold uppercase tracking-wide text-muted-foreground mb-2">Пресеты</p>
              <div className="flex flex-wrap gap-1.5">
                {PRESETS.map((p, i) => (
                  <Button
                    key={i}
                    type="button"
                    variant="outline"
                    size="sm"
                    className="h-7 text-xs px-2"
                    onClick={() => applyPreset(i)}
                  >
                    {p.label}
                  </Button>
                ))}
              </div>
            </div>

            <Separator />

            {/* Name & Type */}
            <div className="grid gap-3">
              <Field label="Название изделия">
                <Input value={config.name} onChange={(e) => set('name', e.target.value)} className="h-8 text-sm" placeholder="Шкаф-купе" />
              </Field>
              <Field label="Тип мебели">
                <Select value={config.type} onValueChange={(v) => set('type', v as FurnitureType)}>
                  <SelectTrigger className="h-8 text-sm"><SelectValue /></SelectTrigger>
                  <SelectContent>
                    {FURNITURE_TYPES.map((t) => (
                      <SelectItem key={t.value} value={t.value}>{t.label}</SelectItem>
                    ))}
                  </SelectContent>
                </Select>
              </Field>
            </div>

            <Separator />

            {/* Dimensions */}
            <div>
              <p className="text-xs font-semibold uppercase tracking-wide text-muted-foreground mb-2">Размеры корпуса (мм)</p>
              <div className="grid grid-cols-3 gap-2">
                <Field label="Ширина"><NumInput value={config.width} min={100} onChange={(v) => set('width', v)} /></Field>
                <Field label="Высота"><NumInput value={config.height} min={100} onChange={(v) => set('height', v)} /></Field>
                <Field label="Глубина"><NumInput value={config.depth} min={100} onChange={(v) => set('depth', v)} /></Field>
              </div>
              <div className="grid grid-cols-2 gap-2 mt-2">
                <Field label="Толщина мат. (мм)">
                  <NumInput value={config.thickness} min={8} max={36} onChange={(v) => set('thickness', v)} />
                </Field>
                <Field label="Секций по ширине">
                  <NumInput value={config.sections} min={1} max={8} onChange={(v) => set('sections', Math.round(v))} />
                </Field>
              </div>
            </div>

            <Separator />

            {/* Filling */}
            <div>
              <p className="text-xs font-semibold uppercase tracking-wide text-muted-foreground mb-2">Наполнение</p>
              <div className="space-y-3">
                {/* Shelves */}
                <div className="grid grid-cols-2 gap-2">
                  <Field label="Полок на секцию">
                    <NumInput value={config.shelves.count} min={0} max={20} onChange={(v) => onChange({ ...config, shelves: { ...config.shelves, count: v } })} />
                  </Field>
                  <Field label="Тип полок">
                    <Select
                      value={config.shelves.fullWidth ? 'full' : 'half'}
                      onValueChange={(v) => onChange({ ...config, shelves: { ...config.shelves, fullWidth: v === 'full' } })}
                    >
                      <SelectTrigger className="h-8 text-sm"><SelectValue /></SelectTrigger>
                      <SelectContent>
                        <SelectItem value="full">На всю ширину</SelectItem>
                        <SelectItem value="half">Половинные</SelectItem>
                      </SelectContent>
                    </Select>
                  </Field>
                </div>

                {/* Drawers */}
                <div className="grid grid-cols-2 gap-2">
                  <Field label="Ящиков на секцию">
                    <NumInput value={config.drawers.count} min={0} max={10} onChange={(v) => onChange({ ...config, drawers: { ...config.drawers, count: v } })} />
                  </Field>
                  <Field label="Высота ящика (мм)">
                    <NumInput value={config.drawers.height} min={80} max={500} onChange={(v) => onChange({ ...config, drawers: { ...config.drawers, height: v } })} />
                  </Field>
                </div>

                {/* Doors */}
                <div className="grid grid-cols-2 gap-2">
                  <Field label="Тип дверей">
                    <Select
                      value={config.doors.type}
                      onValueChange={(v) => onChange({ ...config, doors: { ...config.doors, type: v as 'none' | 'swing' | 'sliding' } })}
                    >
                      <SelectTrigger className="h-8 text-sm"><SelectValue /></SelectTrigger>
                      <SelectContent>
                        <SelectItem value="none">Без дверей</SelectItem>
                        <SelectItem value="swing">Распашные</SelectItem>
                        <SelectItem value="sliding">Купе</SelectItem>
                      </SelectContent>
                    </Select>
                  </Field>
                  {config.doors.type !== 'none' && (
                    <Field label="Кол-во дверей">
                      <NumInput value={config.doors.count} min={1} max={8} onChange={(v) => onChange({ ...config, doors: { ...config.doors, count: v } })} />
                    </Field>
                  )}
                </div>

                {/* Checkboxes */}
                <div className="space-y-2 pt-1">
                  <CheckRow id="backPanel"    checked={config.backPanel}    onChange={(v) => set('backPanel', v)}    label="Задняя стенка (ХДФ)" />
                  <CheckRow id="topPanel"     checked={config.topPanel}     onChange={(v) => set('topPanel', v)}     label="Крышка" />
                  <CheckRow id="hangingRod"   checked={config.hangingRod}   onChange={(v) => set('hangingRod', v)}   label="Штанга для одежды" />
                  <CheckRow id="bottomLegs"   checked={config.bottomLegs}   onChange={(v) => set('bottomLegs', v)}   label="Ножки" />
                  <CheckRow id="mezzanine"    checked={config.mezzanine}    onChange={(v) => set('mezzanine', v)}    label="Антресоль" />
                  {config.mezzanine && (
                    <Field label="Высота антресоли (мм)">
                      <NumInput value={config.mezzanineHeight} min={200} max={800} onChange={(v) => set('mezzanineHeight', v)} />
                    </Field>
                  )}
                </div>
              </div>
            </div>

            <Separator />

            {/* Price */}
            <div>
              <p className="text-xs font-semibold uppercase tracking-wide text-muted-foreground mb-2">Стоимость</p>
              <Field label="Цена материала за м² (руб.)">
                <NumInput value={config.pricePerSqM} min={100} onChange={(v) => set('pricePerSqM', v)} />
              </Field>
            </div>
          </div>
        );
      }
    app/order-summary.tsx: >
      import { Trash2, X } from 'lucide-react';

      import { Button } from '@/components/ui/button';

      import { Card, CardContent, CardHeader, CardTitle } from
      '@/components/ui/card';

      import { Input } from '@/components/ui/input';

      import { Label } from '@/components/ui/label';

      import { Separator } from '@/components/ui/separator';

      import { Badge } from '@/components/ui/badge';

      import type { OrderItem } from './types';

      import { calculate } from './calculator';


      interface Props {
        items: OrderItem[];
        discount: number;
        onDiscountChange: (v: number) => void;
        onRemoveItem: (id: string) => void;
        onClearAll: () => void;
        onEditItem: (item: OrderItem) => void;
      }


      function fmtMoney(n: number) {
        return n.toLocaleString('ru-RU', { style: 'currency', currency: 'RUB', maximumFractionDigits: 0 });
      }

      function fmtArea(n: number) {
        return n.toLocaleString('ru-RU', { maximumFractionDigits: 3 });
      }


      export function OrderSummary({ items, discount, onDiscountChange,
      onRemoveItem, onClearAll, onEditItem }: Props) {
        const itemResults = items.map((item) => ({ item, result: calculate(item.config) }));
        const subtotal = itemResults.reduce((s, r) => s + r.result.totalPrice, 0);
        const discountAmt = subtotal * (discount / 100);
        const total = subtotal - discountAmt;

        if (items.length === 0) {
          return (
            <Card>
              <CardContent className="p-6 flex flex-col items-center justify-center py-10 text-muted-foreground gap-2">
                <p className="font-medium">Заказ пуст</p>
                <p className="text-sm text-center">Настройте параметры изделия и нажмите «Добавить в заказ»</p>
              </CardContent>
            </Card>
          );
        }

        return (
          <Card>
            <CardHeader className="flex-row items-center justify-between pb-3">
              <CardTitle className="text-base">Заказ</CardTitle>
              <Button type="button" variant="ghost" size="sm" className="text-destructive hover:text-destructive gap-1 h-8" onClick={onClearAll}>
                <Trash2 className="h-3.5 w-3.5" />
                Очистить всё
              </Button>
            </CardHeader>
            <CardContent className="p-6 pt-0 space-y-3">
              {/* Item list */}
              {itemResults.map(({ item, result }) => (
                <div key={item.id} className="flex items-center justify-between gap-2 p-3 rounded-lg bg-muted/40 border">
                  <button
                    type="button"
                    className="flex-1 text-left"
                    onClick={() => onEditItem(item)}
                  >
                    <p className="text-sm font-medium leading-tight">{item.config.name}</p>
                    <p className="text-xs text-muted-foreground mt-0.5">
                      {item.config.width}×{item.config.height}×{item.config.depth} мм &bull; {fmtArea(result.totalAreaSqM)} м²
                    </p>
                  </button>
                  <div className="flex items-center gap-2 shrink-0">
                    <Badge variant="secondary" className="text-sm font-semibold">
                      {fmtMoney(result.totalPrice)}
                    </Badge>
                    <Button
                      type="button"
                      variant="ghost"
                      size="icon"
                      className="h-7 w-7 text-muted-foreground hover:text-destructive"
                      onClick={() => onRemoveItem(item.id)}
                    >
                      <X className="h-4 w-4" />
                    </Button>
                  </div>
                </div>
              ))}

              <Separator />

              {/* Subtotal */}
              <div className="flex justify-between text-sm">
                <span className="text-muted-foreground">Подытог ({items.length} поз.)</span>
                <span className="font-medium">{fmtMoney(subtotal)}</span>
              </div>

              {/* Discount */}
              <div className="flex items-center gap-2">
                <Label className="text-sm text-muted-foreground shrink-0">Скидка</Label>
                <div className="flex items-center gap-1 ml-auto">
                  <Input
                    type="number"
                    min={0}
                    max={100}
                    value={discount}
                    onChange={(e) => {
                      const v = parseFloat(e.target.value);
                      onDiscountChange(isNaN(v) ? 0 : Math.min(100, Math.max(0, v)));
                    }}
                    className="h-8 w-16 text-sm text-right"
                  />
                  <span className="text-sm text-muted-foreground">%</span>
                </div>
              </div>

              {discount > 0 && (
                <div className="flex justify-between text-sm text-green-700">
                  <span>Сумма скидки</span>
                  <span className="font-medium">− {fmtMoney(discountAmt)}</span>
                </div>
              )}

              <Separator />

              {/* Total */}
              <div className="flex justify-between items-center">
                <span className="font-semibold">Итого к оплате</span>
                <span className="text-xl font-bold text-primary">{fmtMoney(total)}</span>
              </div>
            </CardContent>
          </Card>
        );
      }
